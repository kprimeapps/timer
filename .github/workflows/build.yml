name: Build Windows Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: npx @tauri-apps/cli@latest build --ci

      - uses: actions/upload-artifact@v4
        with:
          name: ProgramTimer-Windows
          path: src-tauri/target/release/program-timer.exe
